timezone: Asia/Shanghai
run_mode: interactive

schedule:
  enable: false
  # 盘前/盘后时间必须通过 config 提供；未配置时不自动定时
  pre_market_time: "08:30"
  after_close_time: "15:30"

evaluation:
  # 收益率不达标阈值（例如 0.01 表示 1%）
  min_expected_return: 0.0
  # 是否“亏损即触发复盘”
  loss_trigger: true

data:
  providers: ["mock"]
  # Phase 0：用 mock_prices 让系统可演示闭环（后续可接入 akshare/tushare 等）
  mock_prices:
    000001.SZ: 10.0
    510300.SH: 3.5

storage:
  output_dir: data/processed/phase0

llm:
  provider: null
  model: null

traders:
  - trader_id: trader_a
    display_name: Trader A
    article_sources:
      urls: []
      rss: []
      site_type: null
      crawl_frequency_minutes: null
    trade_log_sources:
      csv_paths: []
    watchlist: ["000001.SZ", "510300.SH"]
    default_target_pct: 0.05
    default_stop_pct: 0.03
