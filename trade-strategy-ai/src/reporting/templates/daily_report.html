<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>盘前日报 {{as_of_date}}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif;
            margin: 24px;
            color: #111;
        }

        h1 {
            margin: 0 0 8px 0;
        }

        .meta {
            color: #555;
            margin: 0 0 16px 0;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .card {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px 14px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border-bottom: 1px solid #eee;
            padding: 8px 6px;
            vertical-align: top;
        }

        th {
            text-align: left;
            color: #333;
            font-weight: 600;
        }

        code {
            background: #f6f8fa;
            padding: 0 4px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <h1>盘前日报</h1>
    <p class="meta">日期：<code>{{as_of_date}}</code>｜生成时间：<code>{{generated_at}}</code></p>

    <div class="grid">
        <div class="card">
            <h2>要点</h2>
            {{highlights}}
        </div>
        <div class="card">
            <h2>风险提示</h2>
            {{risks}}
        </div>
    </div>

    <div class="card" style="margin-top:16px;">
        <h2>交易想法</h2>
        <table>
            <thead>
                <tr>
                    <th>交易员</th>
                    <th>标的</th>
                    <th>方向</th>
                    <th>入场类型</th>
                    <th>入场价</th>
                    <th>目标价</th>
                    <th>止损价</th>
                    <th>仓位</th>
                    <th>置信度</th>
                    <th>理由</th>
                    <th>失效条件</th>
                </tr>
            </thead>
            <tbody>
                {{ideas_rows}}
            </tbody>
        </table>
    </div>
</body>

</html>
