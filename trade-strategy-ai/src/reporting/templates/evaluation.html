<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>盘后考核 {{as_of_date}}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif;
            margin: 24px;
            color: #111;
        }

        h1 {
            margin: 0 0 8px 0;
        }

        .meta {
            color: #555;
            margin: 0 0 16px 0;
        }

        .card {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border-bottom: 1px solid #eee;
            padding: 8px 6px;
            vertical-align: top;
        }

        th {
            text-align: left;
            color: #333;
            font-weight: 600;
        }

        code {
            background: #f6f8fa;
            padding: 0 4px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <h1>盘后考核</h1>
    <p class="meta">日期：<code>{{as_of_date}}</code>｜生成时间：<code>{{generated_at}}</code></p>

    <div class="card">
        <h2>汇总</h2>
        {{summary}}
    </div>

    <div class="card">
        <h2>逐条评估</h2>
        <table>
            <thead>
                <tr>
                    <th>标的</th>
                    <th>入场价</th>
                    <th>现价</th>
                    <th>收益率</th>
                    <th>状态</th>
                    <th>备注</th>
                </tr>
            </thead>
            <tbody>
                {{rows}}
            </tbody>
        </table>
    </div>
</body>

</html>
